<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="105" cy="327" r="44" fill="#0a1628" opacity="0.09"/>
    <circle cx="944" cy="250" r="34" fill="#0a1628" opacity="0.11"/>
    <circle cx="93" cy="-20" r="34" fill="#0a1628" opacity="0.19"/>
    <circle cx="431" cy="369" r="27" fill="#0a1628" opacity="0.12"/>
    <circle cx="120" cy="19" r="64" fill="#0a1628" opacity="0.11"/>
    <circle cx="372" cy="388" r="55" fill="#0a1628" opacity="0.06"/>
    <rect x="686" y="328" width="39" height="98" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(0, 22, 398)"/>
    <rect x="368" y="365" width="89" height="63" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(18, 365, 42)"/>
    <rect x="867" y="720" width="59" height="81" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(3, -68, 175)"/>
    <rect x="564" y="349" width="35" height="85" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(12, 942, 679)"/>
    <rect x="1231" y="440" width="86" height="94" rx="8" fill="#0d2137" opacity="0.13" transform="rotate(9, -18, 575)"/>
    <rect x="1123" y="265" width="29" height="27" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(44, 933, 177)"/>
    <rect x="556" y="475" width="61" height="57" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(39, 489, -44)"/>
    <rect x="1050" y="326" width="24" height="26" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(7, 1084, 154)"/>
    <polygon points="564,565 629,695 499,695" fill="#0a1628" opacity="0.12"/>
    <polygon points="362,-130 426,-2 298,-2" fill="#0a1628" opacity="0.09"/>
    <polygon points="52,193 117,323 -13,323" fill="#0a1628" opacity="0.05"/>
    <polygon points="932,417 987,527 877,527" fill="#0a1628" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,584 C360,607 840,561 1200,584 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포 셔츠룸 가격 투명성 비교
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 마포 셔츠룸 가격 투명성 비교 — 셔츠룸
  </text>
</svg>